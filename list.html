<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务列表 - 我的待办</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>任务列表</h1>
      <a href="index.html" class="link">返回首页</a>
    </header>

    <section class="task-section">
      <div class="section-header">
        <h2>所有待办</h2>
        <a href="detail.html" class="btn btn-primary">添加新任务</a>
      </div>

      <ul class="task-list" id="taskList">
        <!-- 由 JS 动态渲染 -->
      </ul>

      <p class="empty-hint" id="emptyHint" style="display: none;">暂无任务，点击「添加新任务」开始吧～</p>
    </section>
  </main>
  <script src="js/app.js"></script>
  <script>
    (function() {
      const listEl = document.getElementById('taskList');
      const emptyHint = document.getElementById('emptyHint');
      const tasks = TodoApp.getTasks();

      if (tasks.length === 0) {
        emptyHint.style.display = 'block';
      } else {
        tasks.forEach(task => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.completed ? ' completed' : '');
          li.innerHTML = `
            <label class="task-checkbox">
              <input type="checkbox" ${task.completed ? 'checked' : ''} data-id="${task.id}">
              <span class="checkmark"></span>
            </label>
            <a href="detail.html?id=${task.id}" class="task-content">
              <span class="task-title">${escapeHtml(task.title)}</span>
              <span class="task-meta">${formatDate(task.createdAt)} · ${task.completed ? '已完成' : '未完成'}</span>
            </a>
          `;
          listEl.appendChild(li);
        });

        listEl.addEventListener('change', (e) => {
          if (e.target.type === 'checkbox' && e.target.dataset.id) {
            TodoApp.toggleTask(e.target.dataset.id);
            window.location.reload();
          }
        });
      }
    })();
  </script>
</body>
</html>
