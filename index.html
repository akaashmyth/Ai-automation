<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的待办 - 首页TEST</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>我的待办</h1>
    </header>

    <section class="dashboard-cards">
      <article class="card">
        <h2>待办总数</h2>
        <p class="stat-value" id="totalCount">0</p>
      </article>
      <article class="card">
        <h2>今日待办</h2>
        <p class="stat-value" id="todayCount">0</p>
      </article>
    </section>

    <nav class="actions">
      <a href="list.html" class="btn btn-primary">进入任务列表</a>
    </nav>
  </main>
  <script src="js/app.js"></script>
  <script>
    (function() {
      const tasks = TodoApp.getTasks();
      const today = new Date().toDateString();

      document.getElementById('totalCount').textContent = tasks.length;
      document.getElementById('todayCount').textContent = tasks.filter(t =>
        new Date(t.createdAt).toDateString() === today && !t.completed
      ).length;
    })();
  </script>
</body>
</html>
